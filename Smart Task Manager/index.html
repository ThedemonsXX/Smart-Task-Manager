<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Task Manager</title>
    
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>

  <div class="container">

    <header class="hero">
      <h1>Smart Task Manager</h1>
      <p>Manage your tasks faster and cleaner.</p>
    </header>

    <!-- Notification -->

    <div id="notificationd" class="notification">
      <img
        src="Images/notification.png"
        alt="notificationIcon"
        height="20"
        width="20"
      />
      <p id="notificationParagraph"></p>
      <img class="Closenotif"  src="Images/delete.png" width="24px" height="24px" alt="closeBtn" >
    </div>

    <!-- Dashboard -->

    <div class="dashboard">

      <div class="dashboards" id="dashboardCompleted">
        <img src="Images/check-mark.png" alt="">
        <div>
          <h2 id="Completed-count">0</h2>
          <span>Completed</span>
        </div>
      </div>

      <div class="dashboards" id="dashboardPending">
        <img src="Images/hourglass.png" alt="">
        <div>
          <h2 id="Pending-count">0</h2>
          <span>Pending</span>
        </div>
      </div>

      <div class="dashboards" id="dashboardTotal">
        <img src="Images/list.png" alt="">
        <div>
          <h2 id="Total-count">0</h2>
          <span>Total</span>
        </div>
      </div>

    </div>

    <!-- Top Bar -->

    <div id="topbar" class="top-bar">

      <button id="AddTaskBtn" class="Buttons">
        + Add Task
      </button>

      <div class="search">
        <input
          type="text"
          id="searchfield"
          placeholder="Search tasks..."
        />
      </div>

      <div class="filter">

        <label>
          <input
            class="filter-check"
            type="checkbox"
            id="Pending"
          />
          Pending
        </label>

        <label>
          <input
            class="filter-check"
            type="checkbox"
            id="Completed"
          />
          Completed
        </label>

      </div>

    </div>

    <!-- Add Popup -->

    <div class="popup" id="Addpopup">

      <h4>Add Task</h4>

      <label>Title</label>
      <input type="text" id="Atitle" class="Tinput" />

      <label>Time</label>
      <input type="datetime-local" id="Adate" />

      <label>Description</label>
      <textarea id="Adesc" class="Tinput"></textarea>

      <div class="popup-buttons">
        <button class="AddButton" id="ABtnAdd">
          Add
        </button>

        <button class="CloseButton" id="ABtnclose">
          Close
        </button>
      </div>

    </div>

    <!-- Modify Popup -->

    <div class="popup" id="Modifypopup">

      <h4>Modify Task</h4>

      <input type="hidden" id="hiddenId">

      <label>Title</label>
      <input type="text" id="Mtitle" class="Tinput" />

      <label>Time</label>
      <input type="datetime-local" id="Mdate" />

      <label>Status</label>

      <select id="Status">
        <option value="Pending">Pending</option>
        <option value="Completed">Completed</option>
      </select>

      <label>Description</label>
      <textarea id="Mdesc" class="Tinput"></textarea>

      <div class="popup-buttons">

        <button class="ModifyButton Buttons" id="MBtnAdd">
          Modify
        </button>

        <button class="CloseButton Buttons" id="MBtnclose">
          Close
        </button>

      </div>

    </div>

    <!-- Table -->

    <div class="table-wrapper">

      <table id="table">

        <thead>
          <tr>
            <th>Title</th>
            <th>Time</th>
            <th>Status</th>
            <th>Description</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="tableBody"></tbody>

      </table>

    </div>

  </div>

  <script src="Script.js"></script>

</body>
</html>
